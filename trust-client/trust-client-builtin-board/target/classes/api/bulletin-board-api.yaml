                details:
                  - '@type': string
                    key_0: 9782.503974832818
                    key_1: string
                  - '@type': string
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        '@type':
                          type: string
              example:
                code: 1979
                message: string
                details:
                  - '@type': string
                    key_0: 9782.503974832818
                    key_1: string
                  - '@type': string
      tags:
        - v1
        - addresses
        - '{address}'
      description: >-
        This endpoint retrieves the VASP who has custody of an address. You must
        query with the sha512 hash of the address. Additionally, a proof of
        ownership (or an IOU) is returned so VASP(S) can self-verify.
    parameters:
      - name: address
        in: path
        required: true
        description: The SHA512 of the blockchain address.
        schema:
          type: string
        example: string
    delete:
      summary: Delete a Record of Address Custody
      parameters:
