version: v1beta1
plugins:
  - name: go
    out: gen/go
    opt: paths=source_relative
  - name: go-grpc
    out: gen/go
    opt: paths=source_relative
  - name: grpc-gateway
    out: gen/go
    opt: paths=source_relative,generate_unbound_methods=true
  - name: openapiv2
    out: api
    opt: fqn_for_openapi_name=true,include_package_in_tags=false