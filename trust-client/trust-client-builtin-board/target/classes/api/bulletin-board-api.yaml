                      type: object
                      properties:
                        '@type':
                          type: string
              example:
                code: 1979
                message: string
                details:
                  - '@type': string
                    key_0: 9782.503974832818
                    key_1: string
                  - '@type': string
        '500':
          description: Internal service error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        '@type':
                          type: string
              example:
                code: 1979
