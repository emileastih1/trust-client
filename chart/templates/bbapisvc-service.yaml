apiVersion: v1
kind: Service
metadata:
  annotations:
    {{- range $service_port_name, $target_group := $.Values.services.bbapisvc.target_group_bindings }}
    target-group.aws.infra.coinbase.com/{{ $service_port_name }}: {{ $target_group }}
    {{- end }}
  name: bbapisvc
spec:
  ports:
    - name: api
      port: 443
      targetPort: 443
    - name: health
      port: 8091
      targetPort: 8091
  selector:
    app.kubernetes.io/component: bbapisvc
    app.kubernetes.io/name: travel-rule-bulletin-board-api
