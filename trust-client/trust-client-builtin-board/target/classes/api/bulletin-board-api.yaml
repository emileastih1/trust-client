      description: >+
        This endpoint retrieves the information of a specific VASP.


        VASP(S) can query the GET /addresses endpoint to know the VASP(R) who
        claims the custody of an address.


        Once VASP(S) knows VASP(R)'s identity and verifies the Proof of Address
        Ownership, it can query this endpoint to know VASP(R)'s PII endpoint. 


        The PII information should be encrypted with the VASP(R)'s publicKey
        using the JOSE spec before being transmitted to VASP(R)'s PII endpoint. 

