openapi: 3.0.0
info:
  title: The Bulletin Board for TRUST
  version: 1.0.0
  description: |-
    Bulletin Board Service

    Contact Support:
     Name: TRUST
servers:
  - url: /
paths:
  /health:
    get:
      summary: Health check endpoint
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                title: Health Response
                type: object
