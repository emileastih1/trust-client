      description: This is the health check endpoint
  /v1/address_ownership_proofs/{address}:
    put:
      summary: >-
        Submit a proof of address ownership for a previously claimed
        (address/chain)
      responses:
        '200':
          description: Create or update proof of address succeeded
          content:
            application/json:
              schema:
                title: Create Address Ownership Proof Response
                type: object
                properties:
                  registrationId:
                    type: string
                    description: The created proof of address ownership
              example:
                registrationId: string
        '400':
          description: >-
            Invalid request. For example, the (address, chain, registration_id)
            combination is invalid or missing fields.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        '@type':
                          type: string
              example:
                code: 1979
                message: string
                details:
                  - '@type': string
                    key_0: 9782.503974832818
                    key_1: string
                  - '@type': string
        '403':
          description: Not authorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        '@type':
                          type: string
              example:
                code: 1979
                message: string
                details:
                  - '@type': string
                    key_0: 9782.503974832818
                    key_1: string
                  - '@type': string
        '409':
          description: Conflicted proof status, e.g., change from non-IOU to IOU
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        '@type':
                          type: string
              example:
                code: 1979
                message: string
                details:
                  - '@type': string
                    key_0: 9782.503974832818
                    key_1: string
                  - '@type': string
        '500':
          description: Internal service error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        '@type':
                          type: string
              example:
                code: 1979
                message: string
                details:
                  - '@type': string
                    key_0: 9782.503974832818
                    key_1: string
                  - '@type': string
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        '@type':
                          type: string
              example:
                code: 1979
                message: string
                details:
                  - '@type': string
                    key_0: 9782.503974832818
                    key_1: string
                  - '@type': string
      tags:
        - v1
        - address_ownership_proofs
        - '{address}'
      description: This is the singular endpoint for creating an address ownership proof
      requestBody:
        content:
          application/json:
            schema:
              title: Create Address Ownership Proof Request
              type: object
              properties:
                registrationId:
                  type: string
                  description: >-
                    The registration UUID when you claimed the address by
                    calling PUT /addresses/<address>
                chain:
                  type: string
                  description: The blockchain of the address, e.g., BITCOIN, ETHEREUM
                signature:
                  type: string
                  description: >-
                    The signature of the proof of ownership message signed by
                    the private key of the address
                prefix:
                  type: string
                  description: The prefix of the claiming VASP's choice
                iou:
                  type: boolean
                  description: Indicate whether this is an IOU
                auxProofData:
                  type: array
                  description: >-
                    Additional data supporting the different types of proof of
                    address ownerships, e.g., redeem script. (See Proof of
                    Address Ownership Spec doc for auxiliary data required for
                    all of the supported proof types)
                  items:
                    title: Aux Proof Data
                    type: object
                    properties:
                      type:
                        type: string
                        description: >-
                          Supported AuxProofData type, e.g., ETH_CREATE,
                          ETH_CREATE2, REDEEM_SCRIPT.
                      data:
                        type: object
                        description: >-
                          Key-value pairs data. Each type of aux data should
                          come with pre-defined set of parameters. (See See
                          Proof of Address Ownership Spec doc for the data
                          schema) 
                proofType:
                  type: string
                  description: >-
                    The proof type dictating the logic of proofing and
                    verification according to the spec. Example values:
                    BITCOIN_P2PKH, BITCOIN_P2SH, BITCOIN_P2WPKH, BITCOIN_P2WSH,
                    ETHEREUM_EOA, ETHEREUM_CONTRACT. (See Proof of Address
                    Ownership Spec doc for all the supported proof types)
            example:
              registrationId: string
              chain: string
              signature: string
              prefix: string
              iou: false
              auxProofData:
                - type: string
                  data:
                    key_0: string
                    key_1: string
                    key_2: string
                - type: string
                  data:
                    key_0: string
                    key_1: string
              proofType: string
    parameters:
      - name: address
        in: path
        required: true
        description: The SHA512 of the blockchain address
        schema:
          type: string
        example: string
  /v1/addresses/{address}:
    get:
      summary: Retrieve the custody of an address and the proof of address ownership
      parameters:
        - name: chain
          in: query
          required: false
          description: The blockchain of the address, e.g., BITCOIN, ETHEREUM.
          schema:
            type: string
          example: string
      responses:
        '200':
          description: Get address ownership succeeded
          content:
            application/json:
              schema:
                title: Get Address Ownership Response
                type: object
                properties:
                  vasp:
                    type: object
                    title: VASP Response Object
                    properties:
                      id:
                        type: string
                        description: VASP UUID in the Bulletin Board config
                      name:
                        type: string
                        description: VASP name
                      domain:
                        type: string
                        description: >-
                          The domain is the dNSName in the SAN (Subject
                          Alternative Name) of a VASP's client certificate. This
                          will be used by all other VASPs' P2P channel and the
                          bulletin Board for authentication during the mTLS
                          handshake
                      piiEndpoint:
                        type: string
                        description: >-
                          The endpoint for receiving PII data. This is a full
                          url (host + path) that can be directly used to make
                          the HTTPS API call
                      piiRequestEndpoint:
                        type: string
                        description: >-
                          The endpoint for requesting PII data. This is a full
                          url (host + path) that can be directly used to make
                          the HTTPS API call
                      publicKey:
                        type: string
                        description: >-
                          The public key for other VASPs to encrypt the PII data
                          using the JWE JOSE spec
                      lei:
                        type: string
                        description: The Legal Entity Identifier of the VASP
                      publicKeyVersion:
                        type: integer
                        description: >-
                          The version of the public key. Version should be
                          bumped when a VASP rotates and updates its public key
                        format: int32
                      returnAddressEndpoint:
                        type: string
                        description: >-
                          The endpoint for returning address. This is a full url
                          (host + path) that can be directly used to make the
                          HTTPS API call
                      returnFundConfirmationEndpoint:
                        type: string
                        description: >-
                          The endpoint for returning fund confirmation. This is
                          a full url (host + path) that can be directly used to
                          make the HTTPS API call
                  addressOwnershipProof:
                    type: object
                    title: Address Ownership Proof Response Object
                    properties:
                      id:
                        type: string
                        description: The registration UUID of the address
                      address:
                        type: string
                        description: The SHA512 of the blockchain address
                      signature:
                        type: string
                        description: >-
                          The signature of the proof of ownership message signed
                          by the private key of the address
                      prefix:
                        type: string
                        description: The prefix of the claiming VASP's choice
                      iou:
                        type: boolean
                        description: Indicate whether this is an IOU
                      chain:
                        type: string
                        description: The blockchain of the address, e.g., BITCOIN, ETHEREUM
                      proofType:
                        type: string
                        description: >-
                          The proof type dictating the logic of proofing and
                          verification according to the spec. Example values:
                          BITCOIN_P2PKH, BITCOIN_P2SH, BITCOIN_P2WPKH,
                          BITCOIN_P2WSH, ETHEREUM_EOA, ETHEREUM_CONTRACT. (See
                          Proof of Address Ownership Spec doc for all the
                          supported proof types)
                      auxProofData:
                        type: array
                        description: >-
                          Additional data supporting the different types of
                          proof of address ownerships, e.g., redeem script. (See
                          Proof of Address Ownership Spec doc for auxiliary data
                          required for all of the supported proof types)
                        items:
                          title: Aux Proof Data
                          type: object
                          properties:
                            type:
                              type: string
                              description: >-
                                Supported AuxProofData type, e.g., ETH_CREATE,
                                ETH_CREATE2, REDEEM_SCRIPT.
                            data:
                              type: object
                              description: >-
                                Key-value pairs data. Each type of aux data
                                should come with pre-defined set of parameters.
                                (See See Proof of Address Ownership Spec doc for
                                the data schema) 
              example:
                vasp:
                  id: string
                  name: string
                  domain: string
                  piiEndpoint: string
                  piiRequestEndpoint: string
                  publicKey: string
                  lei: string
                  publicKeyVersion: 7859
                  returnAddressEndpoint: string
                  returnFundConfirmationEndpoint: string
                addressOwnershipProof:
                  id: string
                  address: string
                  signature: string
                  prefix: string
                  iou: false
                  chain: string
                  proofType: string
                  auxProofData:
                    - type: string
                      data:
                        key_0: string
                        key_1: string
                        key_2: string
                        key_3: string
                        key_4: string
                    - type: string
                      data:
                        key_0: string
                        key_1: string
                        key_2: string
        '400':
          description: Invalid request, parameter validation failure.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    format: int32
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        '@type':
                          type: string
              example:
                code: 1979
                message: string
                details:
                  - '@type': string
                    key_0: 9782.503974832818
                    key_1: string
                  - '@type': string
        '403':
          description: Not authorized
          content:
