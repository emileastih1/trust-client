                            The domain is the dNSName in the SAN (Subject
                            Alternative Name) of a VASP's client certificate.
                            This will be used by all other VASPs' P2P channel
                            and the bulletin Board for authentication during the
                            mTLS handshake
                        piiEndpoint:
